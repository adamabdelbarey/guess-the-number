<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg border-0 rounded-4" style="width: 25rem;">
        <div class="card-body p-4">

            <h2 class="text-center mb-4 fw-bold">🎯 Guess The Number</h2>

            <form onsubmit="event.preventDefault(); Guess();">
                <div class="mb-3">
                    <label for="guessTheNumber" class="form-label">
                        Enter your guess
                    </label>

                    <input
                        type="number"
                        class="form-control form-control-lg"
                        id="guessTheNumber"
                        placeholder="1 - 10"
                    >

                    <div id="guessHelp" class="form-text fw-bold fs-6">
                        Try to guess the secret number.
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="button" class="btn btn-primary btn-lg" id="guessBtn" onclick="Guess()">
                        Guess
                    </button>

                    <button type="button" class="btn btn-secondary btn-lg" onclick="Restart()">
                        Restart
                    </button>
                </div>
            </form>

        </div>
        <div class="text-center text-muted mt-3">
            Developed by Adam Abdelbarey
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
